<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення</title>
</head>
<body>
    <form id="orderForm">
        <input type="text" id="name" placeholder="Ім'я" required>
        <input type="tel" id="phone" placeholder="Телефон" required>
        <button type="submit">Замовити</button>
    </form>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let token = "8886259179:AAHa03qbeppMBbvvzBpMpKvcpt81rTZt5Ik"; // Встав сюди токен бота
            let chat_id = "567800143"; // Встав сюди свій ID
            let url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=Ім'я: ${name}, Телефон: ${phone}`;
            
            fetch(url).then(() => alert("Заявка відправлена!"));
        });
    </script>
</body>
</html>
